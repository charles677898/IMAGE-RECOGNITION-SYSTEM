<!DOCTYPE html>
<html>

<head>
    <title>Prediction History</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>📜 Prediction History</h1>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/dashboard">Dashboard</a>
    </div>

    <table>

        <thead>

            <tr>
                <th>ID</th>
                <th>Image</th>
                <th>Prediction</th>
                <th>Confidence</th>
                <th>Date</th>
            </tr>

        </thead>

        <tbody>

            {% for row in history %}

            <tr>

                <td>{{ row[0] }}</td>
                <td>{{ row[1] }}</td>
                <td>{{ row[2] }}</td>
                <td>{{ row[3] }}%</td>
                <td>{{ row[4] }}</td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
